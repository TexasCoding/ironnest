# Supply-chain gate (Phase 4): cargo-deny (license allowlist + advisories + source pinning, per
# deny.toml) and a CycloneDX SBOM artifact. Keeps the shipped wheel's dependency tree licensed,
# un-yanked, and auditable.
name: supply-chain

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources

  sbom:
    name: CycloneDX SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned toolchain
        run: rustup show
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --all --format json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: "**/*.cdx.json"
