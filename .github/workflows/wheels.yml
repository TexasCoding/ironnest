# Build (and, on a v* tag, publish) the `ironnest` abi3-py313 wheel for the three shipping targets
# via maturin. One abi3 wheel per platform serves CPython 3.13+. Each platform also installs its own
# wheel and runs the Python smoke/determinism tests — so the binding is exercised end-to-end on the
# same OSes the engine determinism golden (ci.yml) covers.
name: wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: wheel · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64, manylinux: auto }
          - { os: macos-14, target: aarch64 }
          - { os: windows-latest, target: x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # rustup honours rust-toolchain.toml → the pinned 1.96.0. maturin uses it.
      - name: Install pinned toolchain
        run: rustup show

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -m crates/py/Cargo.toml
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          sccache: "true"

      - name: Install the wheel and run the Python tests
        shell: bash
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install ironnest --no-index --find-links dist --force-reinstall
          python -c "import ironnest; print('ironnest', ironnest.__version__)"
          pytest crates/py/tests -q

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Inert until the repo has a PyPI "ironnest" project with a Trusted Publisher (OIDC) configured for
  # this workflow — then a `git tag vX.Y.Z && git push --tags` publishes. No API token is stored.
  publish:
    name: publish to PyPI
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
