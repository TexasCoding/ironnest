# cargo-deny — supply-chain gate (Phase 4). License allowlist + advisory/yank checks, run in CI by
# .github/workflows/supply-chain.yml. ironnest itself is MPL-2.0; every dependency must carry a
# license on this permissive allowlist (no surprise copyleft creeping into the shipped wheel).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # `atomic-polyfill` is *unmaintained* (not vulnerable). It enters ONLY transitively via
    # geo-buffer → geo → rstar → heapless 0.7. geo-buffer is already slated for replacement
    # (docs/00 §11 risk #2 — it calls std sin/cos and is the lone nonzero-min-sep path), and this
    # advisory leaves the tree with it. No code of ours touches it.
    "RUSTSEC-2023-0089",
]

[licenses]
version = 2
confidence-threshold = 0.9
# Exactly the licenses present in the current tree — so a genuinely new license is a deliberate gate
# (CI fails loudly, a human vets it) rather than silently allowed. All `A OR B`/`A AND B` expressions
# in the graph resolve against this set (e.g. `Unlicense OR MIT` → MIT; `… AND Unicode-3.0` → both).
allow = [
    "MPL-2.0",                       # ironnest + the jagua-rs fork
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Zlib",                          # slotmap
    "Unicode-3.0",                   # unicode-ident
]

[bans]
multiple-versions = "warn"           # surfaced, not fatal — a clean tree is the goal, not a gate
wildcards = "allow"                  # our `"1"`-style requirements resolve via the committed Cargo.lock

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
